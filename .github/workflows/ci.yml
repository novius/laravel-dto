name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php: [8.2, 8.3, 8.4, 8.5]
        laravel: [11.*, 12.*, 13.*]
        dependencies: [lowest, stable]
        exclude:
          - php: 8.2
            laravel: 13.*
          - php: 8.3
            laravel: 13.*

    name: PHP ${{ matrix.php }} - Laravel ${{ matrix.laravel }} (${{ matrix.dependencies }})

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite, bcmath, soap, intl, gd, exif, iconv, imagick, fileinfo
          coverage: none

      - name: Install dependencies
        run: |
          composer require "illuminate/contracts:${{ matrix.laravel }}" "illuminate/support:${{ matrix.laravel }}" "illuminate/validation:${{ matrix.laravel }}" --no-interaction --no-update
          if [ "${{ matrix.dependencies }}" == "lowest" ]; then
            composer update --prefer-lowest --prefer-stable --prefer-dist --no-interaction
          else
            composer update --prefer-stable --prefer-dist --no-interaction
          fi

      - name: Execute tests
        run: composer test -- --compact

      - name: Run analysis
        run: composer analyze

      - name: Check style
        run: composer lint -- --test
